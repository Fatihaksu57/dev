<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SiteSketch</title>

<!-- External libraries -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- App styles -->
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ── App shell ───────────────────────────────────────────────── -->
<div id="app">

    <!-- Header -->
    <header id="appHeader">
        <button id="navBack" class="btn-icon header-btn" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>
        <h1 id="appTitle">SiteSketch</h1>
        <div id="headerActions" class="header-actions"></div>
    </header>

    <!-- ── View: Projects ───────────────────────────────────────── -->
    <div id="viewProjects" class="view">
        <div class="view-content">
            <div id="projectList"></div>
        </div>
        <div class="fab-container">
            <button class="fab" onclick="app.createProject()" title="Neues Projekt">+</button>
        </div>
    </div>

    <!-- ── View: Photos ─────────────────────────────────────────── -->
    <div id="viewPhotos" class="view" style="display:none">
        <div class="view-meta">
            <span id="projectCustomer" class="meta-text"></span>
            <div class="meta-actions">
                <button class="btn-sm btn-outline" onclick="app.showQuantities()">📊 Mengen</button>
                <button class="btn-sm btn-outline" onclick="app.exportExcel()">📋 Excel</button>
            </div>
        </div>
        <div class="view-content">
            <div id="photoGrid" class="photo-grid"></div>
        </div>
        <div class="fab-container">
            <button class="fab fab-secondary" onclick="app.openMapView()" title="Kartenausschnitt">🗺</button>
            <button class="fab" onclick="app.addPhotos()" title="Fotos hinzufügen">+</button>
        </div>
    </div>

    <!-- ── View: Editor ─────────────────────────────────────────── -->
    <div id="viewEditor" class="view view-editor" style="display:none">

        <!-- Annotation toolbar (left sidebar) -->
        <div id="editorToolbar" class="editor-toolbar"></div>

        <!-- Canvas area -->
        <div id="canvasWrapper" class="canvas-wrapper">
            <canvas id="editorCanvas"></canvas>
        </div>

        <!-- Right sidebar: Layers + Legend -->
        <div id="editorSidebar" class="editor-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-header">
                    <span>Elemente</span>
                    <div class="sidebar-header-actions">
                        <button class="btn-icon btn-xs" onclick="app.editor.undo()" title="Rückgängig">↩</button>
                        <button class="btn-icon btn-xs" onclick="app.editor.redo()" title="Wiederholen">↪</button>
                        <button class="btn-icon btn-xs" onclick="app.editor.zoomIn()" title="Zoom +">+</button>
                        <button class="btn-icon btn-xs" onclick="app.editor.zoomOut()" title="Zoom -">−</button>
                        <button class="btn-icon btn-xs" onclick="app.editor.zoomReset()" title="Zoom zurücksetzen">⊙</button>
                    </div>
                </div>
                <div id="layerList" class="layer-list"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-header">Legende</div>
                <div id="legendList" class="legend-list"></div>
            </div>
        </div>

        <!-- Trasse properties panel -->
        <div id="trasseProps" class="trasse-props" style="display:none"></div>

        <!-- Save button -->
        <button class="save-fab" onclick="app.saveCurrentPhoto()" title="Speichern">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
            </svg>
        </button>
    </div>

    <!-- ── View: Map Capture ────────────────────────────────────── -->
    <div id="viewMapCapture" class="view" style="display:none">
        <div class="map-toolbar">
            <input type="text" id="mapSearch" class="map-search" placeholder="Adresse suchen…">
            <button class="btn-primary" onclick="app.captureMap()">📸 Aufnehmen</button>
            <button class="btn-outline" onclick="app.closeMapView()">Abbrechen</button>
        </div>
        <div id="mapContainer" class="map-container"></div>
    </div>

</div><!-- /#app -->

<!-- ── Global overlays ──────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<div id="spinner" class="spinner-overlay" style="display:none">
    <div class="spinner-box">
        <div class="spinner-wheel"></div>
        <span id="spinnerMsg">Bitte warten…</span>
    </div>
</div>

<!-- ── External libraries ───────────────────────────────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- ── App modules (order matters!) ────────────────────────────── -->
<script src="js/constants.js"></script>
<script src="js/database.js"></script>
<script src="js/utils.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>

</body>
</html>
